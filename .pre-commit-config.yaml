# Run `pre-commit autoupdate` periodically to bump rev tags.
# `pre-commit install` once after cloning; hooks then run on every `git commit`.

repos:
  - repo: local
    hooks:
      - id: tofu-fmt
        name: tofu fmt
        entry: tofu fmt
        language: system
        files: \.(tf|tofu|tfvars)$
        require_serial: true

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.2.250
    hooks:
      - id: checkov
        # Pinned to 3.12 because checkov 3.2.x bundles a rustworkx wheel
        # that segfaults on Python 3.14 (Homebrew's current default on
        # macOS). 3.12 is the most-tested target for checkov today.
        language_version: python3.12
        args:
          # --skip-download avoids the BridgeCrew guidelines API call
          # (api0.prismacloud.io). We don't use BC_* skip IDs, so this
          # costs no coverage — all CKV_/CKV2_ built-in rules still run —
          # and it makes commits work offline.
          - --skip-download
          - --config-file
          - policies/checkov-skip.yaml
          - --directory
          - .
          - --quiet
          - --compact
          - --framework
          - terraform
          # `demo/` holds intentionally minimal teaching artifacts that
          # mirror production patterns at a tiny scale (e.g.,
          # `demo/three-tool-import/`). Production modules and root
          # configs under modules/, live/, bootstrap/ are still scanned.
          - --skip-path
          - demo/
          # `live/blueprint/` is the Blueprint canvas's gitignored sandbox —
          # per-session runtime HCL (`bp.*.tf`, `drafts/`) the app writes, not
          # committed source. checkov scans the working tree (not just git), so
          # without this it gates throwaway sandbox files and blocks unrelated
          # commits. The real blueprint workspace files carry no resources.
          - --skip-path
          - live/blueprint/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
