services:
  moto:
    image: motoserver/moto:latest
    container_name: devex-moto
    ports:
      - "4566:5000"
    environment:
      MOTO_PORT: "5000"
      AWS_DEFAULT_REGION: us-east-1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/moto-api/')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
